# Video mode config.
# Fill required paths before running:
#   python run_pipeline.py
# Then choose: video

[pipeline]
# full: run text/script generation, voice, timeline, compose.
# only: run only target_stage.
# from: start from target_stage and continue.
run_mode = 'full'

# Required only when run_mode is 'only' or 'from'.
# Allowed values: 'script', 'profile', 'voice', 'timeline', 'compose'.
target_stage = ''

[input]
# Required. Video mode uses this video, extracts keyframes, and calls call_vl_gemini.
video = ''

# Optional. Set to a .txt reference document to constrain terminology and topic.
# Leave empty when there is no reference document.
reference_document = ''

# Optional. Enable OCR-assisted video script generation when supported.
enable_ocr = false

[voice]
# Recommended. Existing .pt profile file or a profile directory containing <dirname>.pt.
profile = ''

# Optional. Use these three fields instead of profile when you want full mode to create a profile.
voice_name = ''
ref_audio = ''
ref_text = ''

[timeline]
# Optional. Inspect one frame every N video frames when extracting keyframes.
# Example: 30 checks frames 0,30,60...; 1 checks every frame.
frame_stride = 3

# Optional. Minimum seconds between saved change keyframes.
# Higher values reduce noisy repeated keyframes; lower values capture rapid UI changes.
min_gap_sec = 0.5

# Optional. Global image-change threshold.
# A sampled frame is kept as a scene change when its average grayscale difference
# from the last kept frame is at least this value.
global_threshold = 12.0

# Optional. Text/UI-region change threshold.
# Used when global change is below the global threshold; higher values are stricter.
subtitle_threshold = 8.0

# Optional. Max width for detection-only resized frames.
# Saved keyframe images keep original resolution; this only affects similarity scoring.
detection_max_width = 960

# Optional. Insert low-priority stable_fill frames when saved keyframes are this many
# seconds apart or more. Set higher to reduce fill frames.
fill_gap_sec = 6.0

# Optional. Leave empty to read GEMINI_API_KEY from environment or .env.
api_key = ''

[outputs]
# Optional output locations. Leave empty to use default outputs/ paths.
stage1_output_dir = ''
profile_output_dir = ''
voice_output_dir = ''
timeline_output = ''
timeline_debug_dir = ''
compose_output_dir = ''

[cover]
# Optional. When enabled, image is required.
enabled = false
image = ''
duration_sec = ''
paragraph_index = 1

[outro]
# Optional. When enabled, image is required.
# Provide audio for fixed outro audio, or text/profile to generate outro audio.
enabled = false
image = ''
audio = ''
text = ''
profile = ''

[generation]
# Optional. Empty means generate all paragraphs.
paragraphs = ''

# Optional. Empty means no volume gain override.
volume_gain = ''
